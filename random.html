<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey Redirect</title>
</head>
<body>
  <p>Redirecting you to the questionnaire...</p>

  <script>
    const STORAGE_KEY = "survey_group_v1";

    const links = {
      control: "https://example.com/link-control",
      treatment1: "https://example.com/link-treatment-1",
      treatment2: "https://example.com/link-treatment-2"
    };

    function assignGroup() {
      const r = Math.random();
      if (r < 1/3) return "control";
      if (r < 2/3) return "treatment1";
      return "treatment2";
    }

    function buildUrl(base, group) {
      const url = new URL(base);
      url.searchParams.set("grp", group);
      return url.toString();
    }

    let group = localStorage.getItem(STORAGE_KEY);

    if (!group || !links[group]) {
      group = assignGroup();
      localStorage.setItem(STORAGE_KEY, group);
    }

    const finalUrl = buildUrl(links[group], group);
    window.location.replace(finalUrl);
  </script>
</body>
</html>
